<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>MCK Quote Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
  color-adjust: exact !important;
  box-sizing: border-box;
}
@page { size: A4 portrait; margin: 15mm; }
html, body {
  margin: 0; padding: 0;
  background: #0a0a0a !important;
  color: #ffffff !important;
  font-family: 'Inter', -apple-system, sans-serif;
  font-size: 10pt; line-height: 1.5;
}
.container { max-width: 800px; margin: 0 auto; padding: 20pt; }
.page-section { page-break-after: always; padding: 0; margin-bottom: 20pt; }
.page-section:last-child { page-break-after: auto; }

/* Header */
.doc-header { border-bottom: 2px solid #c9a84c; padding-bottom: 16pt; margin-bottom: 16pt; }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14pt; flex-wrap: wrap; gap: 12pt; }
.brand-block .label { font-size: 8pt; color: #c9a84c; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4pt; }
.brand-block h1 { font-size: 22pt; color: #ffffff; margin: 0 0 4pt 0; letter-spacing: 2px; font-weight: 800; }
.brand-block .tagline { font-size: 8.5pt; color: #aaaaaa; letter-spacing: 1px; }
.contact-block { text-align: right; font-size: 8.5pt; color: #aaaaaa; line-height: 2; }
.contact-block strong { color: #c9a84c; font-size: 7pt; letter-spacing: 1px; margin-right: 6pt; }

/* Meta Grid */
.meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; background: #1a1a1a !important; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
.meta-cell { padding: 8pt 12pt; border-right: 1px solid #333; }
.meta-cell:last-child { border-right: none; }
.meta-label { font-size: 6.5pt; color: #c9a84c; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3pt; font-weight: 600; }
.meta-value { font-size: 10pt; color: #ffffff; font-weight: 600; }

/* Banners */
.validity-banner { background: #c9a84c !important; color: #000000 !important; text-align: center; padding: 7pt 12pt; font-size: 8pt; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin: 14pt 0; border-radius: 3px; }
.status-banner { text-align: center; padding: 10pt; font-weight: 800; font-size: 11pt; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14pt; border-radius: 4px; }
.status-pending { background: #c9a84c !important; color: #000 !important; }
.status-accepted { background: #27AE60 !important; color: #fff !important; }
.status-expired { background: #ff4444 !important; color: #fff !important; }

/* Section Headers */
.sec-hd { display: flex; align-items: center; gap: 10pt; margin-bottom: 12pt; padding-bottom: 8pt; border-bottom: 1px solid #333; }
.sec-num { background: #c9a84c !important; color: #000000 !important; font-weight: 800; font-size: 9pt; padding: 3pt 8pt; border-radius: 3px; min-width: 24pt; text-align: center; }
.sec-hd h2 { margin: 0; font-size: 11pt; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }

/* Fields */
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10pt; }
.field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10pt; }
.field-full { grid-column: 1 / -1; }
.field { background: #111111 !important; border: 1px solid #333; border-radius: 3px; padding: 6pt 10pt; }
.field-lbl { font-size: 6.5pt; color: #c9a84c; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 2pt; }
.field-val { font-size: 9.5pt; color: #ffffff; min-height: 12pt; line-height: 1.5; }

/* Tables */
table { width: 100%; border-collapse: collapse; }
th { background: #1a1a1a !important; color: #c9a84c !important; font-size: 7pt; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; padding: 6pt 8pt; border: 1px solid #c9a84c; text-align: left; }
th.right { text-align: right; }
td { background: #111111 !important; color: #ffffff !important; font-size: 9pt; padding: 5pt 8pt; border: 1px solid #333; }
td.right { text-align: right; }
tr:nth-child(even) td { background: #0d0d0d !important; }
tfoot td { background: #1a1a1a !important; font-weight: 700; border-top: 2px solid #c9a84c !important; }
.grand-total td { color: #c9a84c !important; font-size: 11pt; font-weight: 800; border-top: 2px solid #c9a84c !important; }

/* Callout */
.callout { background: #1a1a1a !important; border-left: 3px solid #c9a84c; padding: 8pt 12pt; font-size: 8pt; color: #ffffff; line-height: 1.6; border-radius: 0 3px 3px 0; margin: 10pt 0; }
.callout strong { color: #c9a84c; }
.callout.warning { border-left-color: #ff4444; }
.callout.warning strong { color: #ff4444; }

/* Inclusions / Exclusions */
.inc-exc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; }
.ie-col { background: #111111 !important; border: 1px solid #333; border-radius: 4px; padding: 10pt 12pt; }
.ie-col h3 { margin: 0 0 8pt 0; font-size: 9pt; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; padding-bottom: 6pt; border-bottom: 1px solid #333; }
.ie-col.inc h3 { color: #c9a84c; }
.ie-col.exc h3 { color: #aaaaaa; }
.ie-item { font-size: 8.5pt; color: #ffffff; padding: 3pt 0; line-height: 1.5; }
.ie-item .tick { color: #c9a84c; font-weight: 700; margin-right: 6pt; }
.ie-item .cross { color: #ff6b6b; font-weight: 700; margin-right: 6pt; }

/* Payment */
.pay-stage { font-size: 7pt; color: #c9a84c; font-weight: 700; }
.pay-note { font-size: 7.5pt; color: #aaaaaa; font-style: italic; }

/* T&C */
.tc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8pt; }
.tc-item { background: #111111 !important; border: 1px solid #333; border-radius: 3px; padding: 8pt 10pt; font-size: 8pt; color: #ffffff; line-height: 1.5; }
.tc-item .tc-head { color: #c9a84c; font-weight: 700; font-size: 7pt; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3pt; }

/* Full T&Cs styling */
.tc-section { margin-bottom: 20pt; }
.tc-section-head { display: flex; align-items: center; gap: 10pt; margin-bottom: 10pt; padding-bottom: 6pt; border-bottom: 1px solid #333; }
.tc-section-num { background: #c9a84c !important; color: #000 !important; font-weight: 800; font-size: 9pt; padding: 3pt 8pt; border-radius: 3px; min-width: 24pt; text-align: center; }
.tc-section-head h2 { margin: 0; font-size: 10pt; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
.clause { display: flex; gap: 8pt; padding: 4pt 0; font-size: 9pt; line-height: 1.6; }
.clause-num { color: #c9a84c; font-weight: 700; min-width: 30pt; font-size: 8pt; }
.clause-text { color: #ddd; }
.sub-clauses { padding-left: 38pt; }
.sub-clause { display: flex; gap: 8pt; padding: 2pt 0; font-size: 8.5pt; }
.sub-num { color: #c9a84c; font-weight: 600; min-width: 40pt; font-size: 7.5pt; }

/* Signatures */
.sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24pt; margin-top: 16pt; }
.sig-label { font-size: 7pt; color: #c9a84c; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 6pt; }
.sig-line { border-bottom: 1px solid #c9a84c; height: 36pt; margin-bottom: 4pt; position: relative; }
.sig-line img { position: absolute; bottom: 2pt; left: 0; max-height: 32pt; max-width: 200pt; }
.sig-sub { font-size: 8pt; color: #aaaaaa; margin-top: 4pt; }

/* Footer */
.doc-footer { margin-top: 20pt; padding: 10pt 14pt; background: #1a1a1a !important; border: 1px solid #333; border-radius: 3px; text-align: center; font-size: 8pt; color: #aaaaaa; line-height: 1.8; }
.doc-footer .gold { color: #c9a84c; font-weight: 700; }
.legal-footer { margin-top: 14pt; padding: 10pt 14pt; background: #111111 !important; border: 1px solid #333; border-radius: 3px; text-align: center; font-size: 7.5pt; color: #aaaaaa; line-height: 1.8; }
.legal-footer strong { color: #c9a84c; }

/* Action Bar */
.action-bar { text-align: center; margin: 24pt 0; }
.action-btn { background: #c9a84c; color: #000; border: none; padding: 14px 36px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 4px; margin: 0 8px; display: inline-block; }
.action-btn:hover { opacity: 0.9; }
.action-btn.ghost { background: transparent; border: 2px solid #c9a84c; color: #c9a84c; }

/* Signature Modal */
.sig-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.sig-modal { background: #111; border: 2px solid #c9a84c; border-radius: 8px; padding: 30px; max-width: 500px; width: 100%; }
.sig-modal h3 { color: #c9a84c; margin: 0 0 16px 0; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
.sig-modal canvas { background: #fff; border: 2px solid #c9a84c; border-radius: 4px; cursor: crosshair; width: 100%; touch-action: none; }
.sig-modal .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.sig-modal label { display: block; color: #c9a84c; font-size: 7pt; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; margin-top: 12px; }
.sig-modal input { width: 100%; padding: 8px 12px; background: #0a0a0a; border: 1px solid #333; border-radius: 3px; color: #fff; font-family: inherit; font-size: 11px; }

/* Saving indicator */
.saving-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center; }
.saving-box { background: #111; border: 2px solid #c9a84c; border-radius: 8px; padding: 40px; text-align: center; }
.saving-box h3 { color: #c9a84c; margin: 0 0 8px 0; font-size: 14px; letter-spacing: 2px; }
.saving-box p { color: #aaa; margin: 0; font-size: 11px; }

/* Error state */
.error-state { text-align: center; padding: 60px 20px; }
.error-state h2 { color: #ff4444; font-size: 18pt; margin-bottom: 12pt; }
.error-state p { color: #aaa; font-size: 11pt; }

/* Loading */
.loading { text-align: center; padding: 80px 20px; }
.loading h2 { color: #c9a84c; font-size: 14pt; letter-spacing: 2px; }

/* View mode badge */
.view-badge { display: inline-block; padding: 4pt 12pt; border-radius: 3px; font-size: 7pt; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12pt; }
.view-badge.client { background: #27AE60; color: #fff; }
.view-badge.internal { background: #c9a84c; color: #000; }
.view-badge.tc { background: #3498DB; color: #fff; }

@media (max-width: 600px) {
  .meta-grid { grid-template-columns: 1fr 1fr; }
  .field-grid, .inc-exc-grid, .sig-grid, .tc-grid { grid-template-columns: 1fr; }
  .field-grid-3 { grid-template-columns: 1fr; }
  .header-row { flex-direction: column; }
  .contact-block { text-align: left; }
  .container { padding: 12pt; }
  .action-btn { display: block; width: 100%; margin: 8px 0; }
}
@media print {
  html, body, * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: #0a0a0a !important; }
  .action-bar, .no-print { display: none !important; }
}
</style>
</head>
<body>
<div class="container" id="quote-container">
  <div class="loading"><h2>LOADING QUOTE...</h2></div>
</div>

<script src="quote-storage.js?v=2"></script>
<script>
(async function() {
  const container = document.getElementById('quote-container');
  const $ = v => '$' + (v != null ? Number(v) : 0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  function formatDateForPDF(dateStr) {
    if (!dateStr) return '___________________________';
    try {
      const parts = dateStr.split('-');
      if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
      return dateStr;
    } catch(e) { return dateStr; }
  }

  // Parse URL parameters
  const params = new URLSearchParams(window.location.search);
  const quoteId = params.get('id');
  const base64Data = params.get('data');
  const viewMode = params.get('view') || 'internal'; // 'client', 'tc', or 'internal'

  const isClient = viewMode === 'client';
  const isTcOnly = viewMode === 'tc';
  const isInternal = viewMode === 'internal' || (!isClient && !isTcOnly);

  let d;

  if (quoteId) {
    // Load from GitHub via quote ID
    try {
      const result = await MCK_QUOTE_STORAGE.loadQuote(quoteId);
      if (result.success) {
        d = result.data;
      } else {
        container.innerHTML = '<div class="error-state"><h2>QUOTE NOT FOUND</h2><p>Quote ID <strong>' + quoteId + '</strong> could not be found. It may have been removed or the link may be incorrect.</p><p style="margin-top:12pt;"><a href="index.html" style="color:#c9a84c;">Go to MCK Business Tools</a></p></div>';
        return;
      }
    } catch (e) {
      container.innerHTML = '<div class="error-state"><h2>LOADING ERROR</h2><p>Failed to load quote data. Please check your internet connection and try again.</p><p style="color:#666;font-size:9pt;margin-top:8pt;">Error: ' + e.message + '</p></div>';
      return;
    }
  } else if (base64Data) {
    // LEGACY: Decode from base64 URL (backwards compatibility)
    try {
      const jsonStr = decodeURIComponent(escape(atob(base64Data)));
      d = JSON.parse(jsonStr);
    } catch (e) {
      container.innerHTML = '<div class="error-state"><h2>INVALID QUOTE DATA</h2><p>The quote data could not be decoded. The link may be corrupted. Please request a new link.</p></div>';
      return;
    }
  } else if (isTcOnly && !quoteId) {
    // T&C only view without a quote — show standalone T&Cs
    d = { quoteNumber: 'N/A', specialConditions: [] };
  } else {
    container.innerHTML = '<div class="error-state"><h2>NO QUOTE DATA</h2><p>This link does not contain valid quote data. Please request a new link from Micro Cement King.</p></div>';
    return;
  }

  // ═══ SAFE DEFAULTS ═══
  d.validityLabel = d.validityLabel || '48 Hours';
  d.validityBanner = d.validityBanner || 'QUOTE VALID FOR 48 HOURS FROM DATE OF ISSUE';
  d.preparedBy = d.preparedBy || 'King Mannion';
  d.subtotal = d.subtotal || 0;
  d.gst = d.gst || (d.subtotal * 0.1);
  d.grandTotal = d.grandTotal || (d.subtotal * 1.1);
  d.depositPct = d.depositPct || 10;
  d.depositAmt = d.depositAmt || (d.subtotal * 0.1);
  d.matPct = d.matPct || 50;
  d.materialAmt = d.materialAmt || (d.subtotal * 0.5);
  d.finalPct = d.finalPct || 40;
  d.finalAmt = d.finalAmt || (d.subtotal * 0.4);
  d.upfrontTotal = d.upfrontTotal || (d.subtotal * 0.95);
  d.lineItems = (d.lineItems || []).map(l => ({
    ...l,
    total: l.total != null ? l.total : ((l.qty || 0) * (l.rate || 0))
  }));
  d.variationItems = d.variationItems || [];
  d.inclusions = d.inclusions || [];
  d.exclusions = d.exclusions || [];
  d.specialConditions = d.specialConditions || [];
  d.attachments = d.attachments || [];
  d.progressPayments = d.progressPayments || [];
  d.measureFee = d.measureFee || 220;
  d.baseSubtotal = d.baseSubtotal || d.subtotal;
  d.varSubtotal = d.varSubtotal || 0;

  // Check expiry
  let isExpired = false;
  let status = d.status || 'PENDING';
  if (d.createdAt && d.validityHours) {
    const created = new Date(d.createdAt);
    const expiry = new Date(created.getTime() + d.validityHours * 60 * 60 * 1000);
    if (new Date() > expiry) {
      isExpired = true;
      status = 'EXPIRED';
    }
  }

  // Check if accepted (stored in quote data or localStorage)
  const acceptedKey = 'mck_quote_accepted_' + d.quoteNumber;
  if (d.clientAcceptedAt || localStorage.getItem(acceptedKey)) {
    status = 'ACCEPTED';
  }

  // ═══════════════════════════════════════════════════════════
  // T&C ONLY VIEW
  // ═══════════════════════════════════════════════════════════
  if (isTcOnly) {
    document.title = 'MCK Terms & Conditions' + (d.quoteNumber !== 'N/A' ? ' — ' + d.quoteNumber : '');

    let scHTML = '';
    if (d.specialConditions && d.specialConditions.length > 0) {
      scHTML = '<div class="tc-section"><div class="tc-section-head"><div class="tc-section-num" style="background:#c9a84c;color:#000;">SC</div><h2>SPECIAL CONDITIONS</h2></div>' +
        d.specialConditions.map(function(c,i){return '<div class="clause"><span class="clause-num">SC.'+(i+1)+'</span><span class="clause-text">'+c+'</span></div>';}).join('') +
      '</div>';
    }

    container.innerHTML = `
<div class="view-badge tc">TERMS & CONDITIONS</div>
<div class="doc-header">
  <div class="header-row">
    <div class="brand-block">
      <div class="label">PAYMENT TERMS & CONDITIONS</div>
      <h1 style="font-size:18pt;">RENDER RENDER PTY LTD<br><span style="font-size:14pt;">trading as MICRO CEMENT KING</span></h1>
    </div>
    <div class="contact-block">
      <div><strong>RENDER RENDER PTY LTD</strong> 0468 041 477</div>
      <div><strong>MICRO CEMENT KING</strong> 0468 053 819</div>
      <div><strong>EMAIL</strong> projects@microcementking.com.au</div>
      <div><strong>WEB</strong> renderking.com.au | microcementking.com.au</div>
      <div style="margin-top:6pt;font-size:7.5pt;color:#666;">All prices ex GST unless stated</div>
    </div>
  </div>
</div>

${d.quoteNumber !== 'N/A' ? '<div class="callout" style="margin-bottom:16pt;"><strong>QUOTE REFERENCE:</strong> ' + d.quoteNumber + (d.clientName ? ' — ' + d.clientName : '') + '</div>' : ''}

${scHTML}

<div class="tc-section"><div class="tc-section-head"><div class="tc-section-num">1</div><h2>FORMATION OF CONTRACT</h2></div>
  <div class="clause"><span class="clause-num">1.1</span><span class="clause-text">Acceptance of a quote, payment of a deposit, or written confirmation constitutes a legally binding agreement/contract with Render Render Pty Ltd trading as Micro Cement King.</span></div>
  <div class="clause"><span class="clause-num">1.2</span><span class="clause-text">This agreement is governed by the Queensland Building and Construction Commission Act 1991 (QBCC Act) and the Building Industry Fairness (Security of Payment) Act 2017 (BIF Act) where applicable.</span></div>
</div>

<div class="tc-section"><div class="tc-section-head"><div class="tc-section-num">2</div><h2>DEPOSIT & PAYMENT TERMS</h2></div>
  <div class="clause"><span class="clause-num">2.1</span><span class="clause-text">A deposit payment of 5-10% is required to secure your project.</span></div>
  <div class="clause"><span class="clause-num">2.2</span><span class="clause-text"><strong><u>50% material invoice</u></strong> will be issued following contract acceptance and approval.</span></div>
  <div class="clause"><span class="clause-num">2.3</span><span class="clause-text">Works will not commence until cleared funds for the deposit and material claim are received.</span></div>
  <div class="clause"><span class="clause-num">2.4</span><span class="clause-text">The remaining balance is payable upon practical completion and must be paid within <strong>3 business days</strong> of the final invoice date, unless otherwise stated.</span></div>
  <div class="clause"><span class="clause-num">2.5</span><span class="clause-text">Time for payment is of the essence.</span></div>
  <div class="clause"><span class="clause-num">2.6</span><span class="clause-text">If the full contract amount is paid prior to commencement, a 5% reduction (capped at $1000) will be applied to the contract sum.</span></div>
  <div class="clause"><span class="clause-num">2.7</span><span class="clause-text">If the deposit and material payment is not received in full within the 14-day timeframe, the scheduled start date may be released or delayed without further notice.</span></div>
</div>

<div class="tc-section"><div class="tc-section-head"><div class="tc-section-num">3</div><h2>CREDIT LIMIT PAYMENTS AND RECOVERY</h2></div>
  <div class="clause"><span class="clause-num">3.1</span><span class="clause-text">A maximum credit limit of $10,000 AUD is extended at the sole discretion of Render Render Pty Ltd trading as Micro Cement King.</span></div>
  <div class="clause"><span class="clause-num">3.2</span><span class="clause-text">Once the value of work completed and/or outstanding invoices exceeds this credit threshold, a progress claim will be issued in accordance with the BIF Act and must be paid within 1 business day before further work continues.</span></div>
  <div class="clause"><span class="clause-num">3.3</span><span class="clause-text">Progress payments help maintain the pace and continuity of the job and ensure delivery schedules are upheld.</span></div>
  <div class="clause"><span class="clause-num">3.4</span><span class="clause-text">All invoices are due strictly by the date stated on the invoice.</span></div>
  <div class="clause"><span class="clause-num">3.5</span><span class="clause-text">Any invoice unpaid after the due date is considered overdue.</span></div>
  <div class="clause"><span class="clause-num">3.6</span><span class="clause-text">An administrative fee of $220 (including GST) will be applied to overdue accounts to cover recovery administration.</span></div>
  <div class="clause"><span class="clause-num">3.7</span><span class="clause-text">A 3-day grace period may be applied at the discretion of the Director to waive the administrative fee. If payment remains outstanding after this period, interest will accrue on overdue amounts at a rate of <strong>3% per week</strong>, calculated and invoiced weekly until paid in full.</span></div>
  <div class="clause"><span class="clause-num">3.8</span><span class="clause-text">All payment claims issued under these terms are legally compliant with the Building Industry Fairness (Security of Payment) Act 2017 (QLD).</span></div>
  <div class="clause"><span class="clause-num">3.9</span><span class="clause-text">The client is liable for all debt recovery costs associated with overdue accounts, including legal fees, adjudication applications, enforcement costs, and collection agency commissions.</span></div>
  <div class="clause"><span class="clause-num">3.10</span><span class="clause-text">Accounts unpaid beyond <strong>30 days</strong> from the due date will be:</span></div>
  <div class="sub-clauses">
    <div class="sub-clause"><span class="sub-num">3.10.1</span><span class="clause-text">Registered as a formal debt with Creditor Watch</span></div>

  // Init modal canvas drawing
  function initModalCanvas(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let drawing = false;
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
    }
    canvas.addEventListener('mousedown', function(e) { drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', function(e) { if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', function() { drawing = false; });
    canvas.addEventListener('mouseleave', function() { drawing = false; });
    canvas.addEventListener('touchstart', function(e) { e.preventDefault(); drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
    canvas.addEventListener('touchend', function() { drawing = false; }, { passive: false });
  }
